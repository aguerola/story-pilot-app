name: storypilot
description: Scene Context — movie metadata, subtitles, and scene Q&A.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dio: ^5.8.0+1
  go_router: ^14.8.1
  get_it: ^8.0.3
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  firebase_core: ^3.13.0
  firebase_ai: ^2.0.0
  bloc_concurrency: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
