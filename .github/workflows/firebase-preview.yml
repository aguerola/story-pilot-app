name: Firebase Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Fork PRs do not have access to repository secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        if: github.event.action != 'closed'
        with:
          channel: stable

      - run: flutter pub get
        if: github.event.action != 'closed'

      - run: flutter test
        if: github.event.action != 'closed'

      - run: |
          flutter build web --release \
            --dart-define=TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            --dart-define=USE_FIREBASE_AI=true
        if: github.event.action != 'closed'

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: storypilot-35945
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
